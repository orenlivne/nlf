# Reproduction environment for examples/nlf_demo.ipynb.
#
# One-time setup (from the repo root):
#   julia --project=examples/repro_env -e 'using Pkg; Pkg.instantiate()'
# then register an IJulia kernel if you do not have one:
#   julia --project=examples/repro_env -e 'using Pkg; Pkg.add("IJulia"); using IJulia; installkernel("Julia")'
#
# NLF (this repo) and LAMG+ are pulled via [sources]; everything else is registered.
[deps]
IJulia = "7073ff75-c697-5162-941a-fcdaad2a7d2a"
Ipopt = "b6b21f68-93f8-5de0-b562-5493be1d77c9"
JuMP = "4076af6c-e467-56ae-b986-b466b2749572"
LAMG = "5a7e4c11-0000-4a1e-9c2f-1a2b3c4d5e6f"
Laplacians = "6f8e5838-0efe-5de0-80a3-5fb4f8dbb1de"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
MatrixMarket = "4d4711f2-db25-561a-b6b3-d35e7d4047d3"
NLF = "cef77db7-f4e9-4a08-a19e-0d28163d44d4"
Optim = "429524aa-4258-5aef-a3af-852621145aeb"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
SparseArrays = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"
UnicodePlots = "b8865327-cd53-5732-bb35-84acbb429228"

[sources]
LAMG = {url = "https://github.com/orenlivne/lamgplus"}
NLF = {path = ".."}
